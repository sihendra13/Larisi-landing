<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Larisi</title>
    <link rel="stylesheet" href="src/css/auth.css">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="split-layout">
        <div class="split-left">
            <div class="auth-header">
                <img src="Assets/logo larisi.svg" alt="Larisi" onerror="this.outerHTML='<h2 style=\'color: var(--rausch); margin: 0;\'>Larisi <span style=\'font-size: 16px;\'>✦</span></h2>'">
            </div>

            <div class="auth-container">
        <h1>Selamat Datang Kembali</h1>

        <form action="index.html" method="GET">
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" placeholder="budi@contoh.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Masukkan password Anda" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()" id="togglePasswordIcon"></i>
                </div>
            </div>

            <div class="form-group" style="margin-top: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
                <label style="font-weight: 400; display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--near-black); cursor: pointer; margin-bottom: 0;">
                    <input type="checkbox" id="rememberMe" style="width: auto; margin: 0; cursor: pointer;" checked>
                    Ingat saya
                </label>
                <a href="#" class="terms-link" style="font-size: 14px;">Lupa password?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">Masuk</button>
            
            <div class="divider">ATAU MASUK DENGAN</div>
            
            <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                <button type="button" class="btn btn-outline" style="flex: 1;" onclick="window.location.href='../../Larisi/radar-larisi/index.html'">
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Google
                </button>
                <button type="button" class="btn btn-outline" style="flex: 1;" onclick="window.location.href='../../Larisi/radar-larisi/index.html'">
                    <i class="fab fa-facebook" style="color: #1877F2; font-size: 20px;"></i>
                    Facebook
                </button>
            </div>

            <div class="login-link">
                Belum punya akun? <a href="register.html">Daftar di sini</a>
            </div>
            

        </form>
            </div>
        </div>

        <div class="split-right"></div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
    </script>
</body>
</html>
